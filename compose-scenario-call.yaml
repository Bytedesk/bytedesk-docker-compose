# 用法：docker compose -p bytedesk -f compose-base.yaml -f compose-db-<mysql|postgresql>.yaml -f compose-mq-<artemis|rabbitmq>.yaml -f compose-scenario-call.yaml -f compose-call-db-<mysql|postgresql>.yaml up -d
# 说明：call 场景仅包含 FreeSWITCH 语音组件；coturn/janus 已拆分到 compose-scenario-webrtc.yaml
services:
  # FreeSwitch 语音通话服务
  # 本地镜像Dockerfile地址：/Users/ningjinpeng/Desktop/git/github/bytedesk-freeswitch/docker/Dockerfile
  # https://hub.docker.com/r/bytedesk/freeswitch
  # https://github.com/Bytedesk/bytedesk-freeswitch
  # 使用自定义构建的 FreeSWITCH 镜像（支持 ARM64/AMD64）
  bytedesk-freeswitch:
    image: registry.cn-hangzhou.aliyuncs.com/bytedesk/freeswitch:latest
    container_name: freeswitch-bytedesk
    restart: always
    entrypoint: ["/usr/local/bin/bytedesk-entrypoint.sh"]
    command: ["freeswitch", "-nf"]
    sysctls:
      net.ipv6.conf.all.disable_ipv6: "0"
      net.ipv6.conf.default.disable_ipv6: "0"
    environment:
      TZ: Asia/Shanghai
      DISABLE_IPV6: "true"
      # 默认分机密码（对应 vars.xml 的 default_password）
      FREESWITCH_DEFAULT_PASSWORD: ${FREESWITCH_DEFAULT_PASSWORD:-123456}
      # SIP 注册/鉴权默认域名（对应 vars.xml 的 domain）
      FREESWITCH_DOMAIN: ${FREESWITCH_DOMAIN:-localhost}
      # 对外宣告给 SIP/SDP 的地址。局域网硬话机场景应固定为宿主机可达地址，避免容器 NAT/STUN 误判。
      FREESWITCH_EXTERNAL_SIP_IP: ${FREESWITCH_EXTERNAL_SIP_IP:-}
      FREESWITCH_EXTERNAL_RTP_IP: ${FREESWITCH_EXTERNAL_RTP_IP:-}
      # ESL 入站口令（与 vars.xml 的 esl_password 对应）
      FREESWITCH_ESL_PASSWORD: ${FREESWITCH_ESL_PASSWORD:-123456}
      # xml_cdr Basic 凭据密码
      FREESWITCH_CDR_PASSWORD: ${FREESWITCH_CDR_PASSWORD:-123456}
      # mod_xml_curl 鉴权 token（需与应用侧配置一致）
      FREESWITCH_XML_CURL_TOKEN: ${FREESWITCH_XML_CURL_TOKEN:-change_me_in_production}
      # mod_xml_curl 回源地址（与 XmlCurlController 统一：/freeswitch/api/v1/xmlcurl）
      FREESWITCH_XML_CURL_GATEWAY_URL: ${FREESWITCH_XML_CURL_GATEWAY_URL:-http://host.docker.internal:9003/freeswitch/api/v1/xmlcurl}
      # 应用基础地址（用于 cdr_url/user_lookup_url 等派生）
      FREESWITCH_API_BASE_URL: ${FREESWITCH_API_BASE_URL:-http://host.docker.internal:9003}
      # FreeSWITCH 数据库连接参数
      FREESWITCH_DB_HOST: ${FREESWITCH_DB_HOST:-bytedesk-db}
      FREESWITCH_DB_PORT: ${FREESWITCH_DB_PORT:-3306}
      FREESWITCH_DB_NAME: ${FREESWITCH_DB_NAME:-bytedesk_freeswitch}
      FREESWITCH_DB_USERNAME: ${FREESWITCH_DB_USERNAME:-root}
      FREESWITCH_DB_PASSWORD: ${FREESWITCH_DB_PASSWORD:-r8FqfdbWUaN3}
      # WebRTC / RTP 参数（如需 WebRTC 能力，可与 compose-scenario-webrtc.yaml 组合使用）
      FREESWITCH_STUN_SERVER: ${FREESWITCH_STUN_SERVER:-stun:bytedesk-coturn:3478}
      FREESWITCH_RTP_START_PORT: ${FREESWITCH_RTP_START_PORT:-16000}
      FREESWITCH_RTP_END_PORT: ${FREESWITCH_RTP_END_PORT:-16129}
    ports:
      - "15060:5060/tcp"
      - "15060:5060/udp"
      - "15080:5080/tcp"
      - "15080:5080/udp"
      - "15061:5061/tcp"
      - "15081:5081/tcp"
      - "15066:5066/tcp"
      - "17443:7443/tcp"
      - "18021:8021/tcp"
      - "18081-18082:8081-8082/tcp"
      - "16000-16129:16000-16129/udp"
    volumes:
      - ../freeswitch/conf:/usr/local/freeswitch/etc/freeswitch
      - ../freeswitch/conf:/usr/local/freeswitch/conf
      - ../freeswitch/bin/bytedesk-entrypoint.sh:/usr/local/bin/bytedesk-entrypoint.sh:ro
      - freeswitch_data:/usr/local/freeswitch/db
      - ../freeswitch/log:/usr/local/freeswitch/log
      - ../freeswitch/sounds:/usr/local/freeswitch/sounds
      - ../freeswitch/recordings:/usr/local/freeswitch/recordings
      - ../freeswitch/etc/odbc.ini:/etc/odbc.ini:ro
      - ../freeswitch/etc/odbcinst.ini:/etc/odbcinst.ini:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      bytedesk-db:
        condition: service_healthy
    networks:
      - bytedesk-network
    healthcheck:
      test: ["CMD-SHELL", "fs_cli -p ${FREESWITCH_ESL_PASSWORD} -x 'status' | grep -q 'UP' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


volumes:
  freeswitch_data:
    name: bytedesk_freeswitch_data
