  # ElasticSearch 向量数据库
  bytedesk-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.0
    container_name: elasticsearch-bytedesk
    environment:
      - node.name=bytedesk-es01
      - cluster.name=bytedesk-es-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    entrypoint: ["bash", "-c", "if [ ! -d /usr/share/elasticsearch/plugins/analysis-ik ]; then echo 'Installing IK plugin...'; if [ -f /tmp/elasticsearch-analysis-ik-8.18.0.zip ]; then /usr/share/elasticsearch/bin/elasticsearch-plugin install --batch file:///tmp/elasticsearch-analysis-ik-8.18.0.zip; else curl -fsSL -o /tmp/elasticsearch-analysis-ik-8.18.0.zip https://www.weiyuai.cn/download/elasticsearch-analysis-ik-8.18.0.zip && /usr/share/elasticsearch/bin/elasticsearch-plugin install --batch file:///tmp/elasticsearch-analysis-ik-8.18.0.zip; fi; fi; exec /usr/local/bin/docker-entrypoint.sh"]
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      # 默认安装 IK 分词插件（本地文件）
      # 如无本地文件，将自动从 https://www.weiyuai.cn/download/elasticsearch-analysis-ik-8.18.0.zip 下载
      - ./elasticsearch-analysis-ik-8.18.0.zip:/tmp/elasticsearch-analysis-ik-8.18.0.zip:ro
    ports:
      - "19200:9200"
      - "19300:9300"
    networks:
      - bytedesk-network
    # healthcheck:
    #   test: ["CMD-SHELL", "curl -s -f http://localhost:9200/_cluster/health?wait_for_status=yellow || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 5

  # https://www.elastic.co/guide/en/logstash/8.18/docker.html
  # Logstash 日志采集中转
  bytedesk-logstash:
    image: docker.elastic.co/logstash/logstash:8.18.0
    container_name: logstash-bytedesk
    depends_on:
      - bytedesk-elasticsearch
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
      - ELASTICSEARCH_HOSTS=http://elasticsearch-bytedesk:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
      - XPACK_MONITORING_ENABLED=false
    volumes:
      - ./logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - log_data:/var/log/bytedesk:ro
      - logstash_data:/usr/share/logstash/data
    ports:
      - "19600:9600"
    networks:
      - bytedesk-network

  # Kibana 日志查询界面
  bytedesk-kibana:
    image: docker.elastic.co/kibana/kibana:8.18.0
    container_name: kibana-bytedesk
    depends_on:
      - bytedesk-elasticsearch
    environment:
      - SERVER_NAME=bytedesk-kibana
      - ELASTICSEARCH_HOSTS=http://elasticsearch-bytedesk:9200
      - ELASTICSEARCH_SERVICEACCOUNTTOKEN=${KIBANA_SERVICE_ACCOUNT_TOKEN}
      - I18N_LOCALE=zh-CN
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=bytedesk-kibana-encrypted-saved-objects-key-2026
      - XPACK_REPORTING_ENCRYPTIONKEY=bytedesk-kibana-reporting-encryption-key-2026
      - XPACK_SECURITY_ENCRYPTIONKEY=bytedesk-kibana-security-encryption-key-2026
    volumes:
      - kibana_data:/usr/share/kibana/data
    ports:
      - "15601:5601"
    networks:
      - bytedesk-network

  # Zipkin 分布式追踪系统- Spring Ai Observability
  # bytedesk-zipkin:
  #   image: 'openzipkin/zipkin:latest'
  #   container_name: zipkin-bytedesk
  #   ports:
