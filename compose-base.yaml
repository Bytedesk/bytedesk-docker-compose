  log_data:
    name: bytedesk_log_data
  logstash_data:
    name: bytedesk_logstash_data
  kibana_data:
    name: bytedesk_kibana_data
  # zipkin_data:
  #   name: bytedesk_zipkin_data
  minio_data:
    name: bytedesk_minio_data

networks:
  bytedesk-network:
    driver: bridge
