input {
  file {
    id => "bytedesk-app-log"
    path => ["/var/log/bytedesk/bytedeskim.log*"]
    start_position => "beginning"
    mode => "tail"
    sincedb_path => "/usr/share/logstash/data/bytedeskim.sincedb"
    codec => multiline {
      pattern => "^\[RID:"
      negate => true
      what => "previous"
      auto_flush_interval => 2
    }
  }
}

filter {
  dissect {
    mapping => {
      "message" => "[RID:%{requestId} TRACEID:%{traceId}] %{rest}"
    }
  }

  if [rest] {
    dissect {
      mapping => {
        "rest" => "%{log_timestamp} %{+log_timestamp} %{[log][level]} --- [%{[process][thread][name]}] %{[log][logger]} : %{parsed_message}"
      }
    }
  }

  if [log_timestamp] {
    date {
      match => ["log_timestamp", "yyyy-MM-dd HH:mm:ss.SSS"]
      target => "@timestamp"
    }
  }

  mutate {
    replace => {
      "message" => "%{parsed_message}"
    }
    add_field => {
      "service.name" => "bytedesk"
      "event.dataset" => "bytedesk.application"
    }
    remove_field => ["rest", "parsed_message", "log_timestamp", "host", "path"]
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS}"]
    user => "${ELASTICSEARCH_USERNAME}"
    password => "${ELASTICSEARCH_PASSWORD}"
    index => "bytedesk-logs-%{+YYYY.MM.dd}"
    ilm_enabled => false
  }
}